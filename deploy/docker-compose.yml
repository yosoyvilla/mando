name: mando

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: mando
      POSTGRES_PASSWORD: mando
      POSTGRES_DB: mando
    ports: ["127.0.0.1:5433:5432"]
    volumes: ["mando_pg:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mando"]
      interval: 5s
      timeout: 3s
      retries: 10
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
  hub:
    build: { context: .., dockerfile: deploy/Dockerfile }
    environment:
      DATABASE_URL: postgres://mando:mando@postgres:5432/mando
      COOKIE_SECRET: change-me-to-a-random-value-32-chars-min # dev only - set a strong random value (32+ chars) before exposing this beyond localhost
      PUBLIC_URL: http://localhost:8080
      PORT: "8080"
      # Optional: bootstrap an admin user on first start.
      # MANDO_ADMIN_EMAIL: admin@example.com
      # MANDO_ADMIN_PASSWORD: change-me-too
      # Optional: enables the Images/provider feature (bring-your-own
      # OpenAI-compatible image provider, API key encrypted at rest).
      # Generate one with `openssl rand -hex 32`. Feature stays disabled
      # if this is unset.
      # MANDO_ENCRYPTION_KEY: change-me-to-a-64-char-hex-string
      # Generated images are stored as files under this directory
      # (apps/hub/src/images/storage.ts), not in Postgres -- mounted below
      # on the mando_images volume so files survive container restarts.
      MANDO_IMAGE_DIR: /data/images
    ports: ["127.0.0.1:8080:8080"]
    volumes: ["mando_images:/data/images"]
    depends_on:
      postgres: { condition: service_healthy }
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
volumes: { mando_pg: {}, mando_images: {} }
