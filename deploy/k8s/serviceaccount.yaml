apiVersion: v1
kind: ServiceAccount
metadata:
  name: mando-hub
  labels:
    app.kubernetes.io/name: mando-hub
    app.kubernetes.io/component: hub
    app.kubernetes.io/version: "0.1.0"
# Dedicated ServiceAccount for the hub workload -- do not use "default".
# No token automount is disabled here on purpose (kept default) because the
# hub does not talk to the Kubernetes API; if that remains true in your
# cluster's policy, consider adding `automountServiceAccountToken: false`.
