apiVersion: v1
kind: ServiceAccount
metadata:
  name: mando-hub
  labels:
    app.kubernetes.io/name: mando-hub
    app.kubernetes.io/component: hub
    app.kubernetes.io/version: "0.1.0"
# Dedicated ServiceAccount for the hub workload -- do not use "default".
# The hub never calls the Kubernetes API, so the default token automount is
# disabled: an attacker who compromises the hub pod gets no ambient
# credential to pivot into the cluster's API server with.
automountServiceAccountToken: false
