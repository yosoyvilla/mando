# -----------------------------------------------------------------------------
# EXAMPLE ONLY. Annotations below assume an nginx-ingress controller and
# cert-manager; adjust for whatever ingress controller/TLS issuer your
# cluster actually runs (Traefik, GKE Ingress, ALB Ingress Controller, etc.
# use different annotation keys/behavior for the same features).
#
# IMPORTANT: /ws/agent is a WebSocket endpoint. Whatever ingress controller
# fronts this Service MUST be configured to allow the HTTP Upgrade header
# through and hold long-lived connections open (nginx-ingress does this by
# default for any backend; some controllers/CDNs need it turned on
# explicitly). TLS terminates at the ingress -- traffic from the ingress to
# the Service/pod is plain HTTP/WS on port 8080 inside the cluster.
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mando-hub
  labels:
    app.kubernetes.io/name: mando-hub
    app.kubernetes.io/component: hub
    app.kubernetes.io/version: "0.1.0"
  annotations:
    # Placeholder cert-manager ClusterIssuer -- replace with a real issuer
    # name (e.g. letsencrypt-prod) defined in your cluster.
    cert-manager.io/cluster-issuer: "letsencrypt-prod-EXAMPLE"
    # nginx-ingress: proxy timeouts long enough for a idle-but-open
    # WebSocket connection on /ws/agent (default nginx-ingress WS support
    # requires no special annotation beyond reasonable timeouts).
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - mando.example.com
      secretName: mando-hub-tls # populated by cert-manager from the issuer above
  rules:
    - host: mando.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mando-hub
                port:
                  number: 80
