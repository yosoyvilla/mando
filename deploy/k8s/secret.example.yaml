# -----------------------------------------------------------------------------
# EXAMPLE ONLY -- DO NOT COMMIT REAL SECRETS TO GIT.
#
# This file exists to document the keys mando-hub's Deployment expects via
# secretKeyRef (see deployment.yaml). Copy it, fill in real values, and apply
# it out-of-band (kubectl apply -f, a secrets manager pipeline step, etc.) --
# never commit the filled-in version.
#
# In production, prefer a Sealed Secret (bitnami-labs/sealed-secrets) or an
# External Secret (external-secrets.io) synced from Vault/AWS Secrets
# Manager/GCP Secret Manager instead of a plain Secret manifest like this one.
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Secret
metadata:
  name: mando-hub-secrets
  labels:
    app.kubernetes.io/name: mando-hub
    app.kubernetes.io/component: hub
    app.kubernetes.io/version: "0.1.0"
type: Opaque
stringData:
  DATABASE_URL: "postgres://mando:CHANGE-ME@postgres.example.internal:5432/mando"
  COOKIE_SECRET: "replace-with-a-long-random-string-CHANGE-ME"
  PUBLIC_URL: "https://mando.example.com"
  # Optional bootstrap admin account, created on first start if the hub
  # supports it (see deploy/docker-compose.yml). Uncomment and set real
  # values only if you want an admin user auto-provisioned; otherwise leave
  # commented out and create the admin through normal app flows.
  # MANDO_ADMIN_EMAIL: "admin@example.com"
  # MANDO_ADMIN_PASSWORD: "change-me-too"
