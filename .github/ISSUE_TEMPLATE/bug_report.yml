name: Bug report
description: Something isn't working the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing this, please try `mando doctor` on the affected
        machine — it catches most "machine shows offline" or "session
        won't load" cases and points at the fix directly. See the
        [Troubleshooting](https://github.com/yosoyvilla/mando#troubleshooting)
        section of the README.

        If this might be a security vulnerability, do not file it here —
        report it privately instead. See [SECURITY.md](https://github.com/yosoyvilla/mando/blob/main/SECURITY.md).

  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you expect, and what happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: The commands you ran and what you clicked, in order.
      placeholder: |
        1. mando connect --hub https://...
        2. Open the session in the browser
        3. ...
    validations:
      required: true

  - type: input
    id: mando-version
    attributes:
      label: Mando version
      description: Output of `mando version`.
      placeholder: v1.1.0
    validations:
      required: true

  - type: textarea
    id: doctor-output
    attributes:
      label: mando doctor output
      description: Output of `mando doctor` run on the affected machine.
      render: text
    validations:
      required: true

  - type: input
    id: opencode-version
    attributes:
      label: opencode version
      description: Output of `opencode --version` on the affected machine.
      placeholder: 1.17.13
    validations:
      required: true

  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS and architecture of the affected machine (and, if relevant, of the hub).
      placeholder: macOS 14, arm64
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Agent, hub, or browser console output — paste as much as is relevant. Remove any tokens, passwords, or other secrets first.
      render: text
