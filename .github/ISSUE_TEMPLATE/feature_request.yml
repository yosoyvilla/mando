name: Feature request
description: Suggest something Mando should do that it doesn't today.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve
      description: What are you trying to do, and where does Mando currently fall short?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see instead? A rough sketch is fine — it does not need to be a full design.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other way to get there, including workarounds you're already using.
    validations:
      required: false
