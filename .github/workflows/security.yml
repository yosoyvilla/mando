name: Security

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - deploy/Dockerfile
      - bun.lock

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Install workspace dependencies
        run: bun install

      - name: Audit dependencies (high and critical)
        run: bun audit --audit-level=high

  image-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Build context is the repo root -- same as deploy/docker-compose.yml's
      # `context: ..` (relative to deploy/), just expressed from the
      # checkout root actionlint/actions run from. This is a Bun workspace,
      # so the Dockerfile needs to see every workspace package.
      - name: Build hub image
        run: docker build -f deploy/Dockerfile -t mando-hub:scan .

      - name: Scan hub image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: mando-hub:scan
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
